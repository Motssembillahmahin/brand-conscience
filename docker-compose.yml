services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: brand_conscience
      POSTGRES_PASSWORD: brand_conscience
      POSTGRES_DB: brand_conscience
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brand_conscience"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  opik:
    image: ghcr.io/comet-ml/opik:latest
    ports:
      - "5173:5173"
      - "8080:8080"

  worker:
    build: .
    command: celery -A brand_conscience.celery_app worker -l info -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://brand_conscience:brand_conscience@postgres:5432/brand_conscience
      REDIS_URL: redis://redis:6379/0

  beat:
    build: .
    command: celery -A brand_conscience.celery_app beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://brand_conscience:brand_conscience@postgres:5432/brand_conscience
      REDIS_URL: redis://redis:6379/0

  app:
    build: .
    command: python -m brand_conscience.cli health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://brand_conscience:brand_conscience@postgres:5432/brand_conscience
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

volumes:
  postgres_data:
